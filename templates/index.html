<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="폭헬방 출석부 🏋️">
  <meta property="og:description" id="og-desc" content="오늘 출석 현황을 확인하세요">
  <meta property="og:image" content="/og-image">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="폭헬방 출석부">
  <title>폭헬방 출석부</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif; background: #f5f4f0; color: #2c2c2a; min-height: 100vh; }
    .header { background: #FEE500; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .date { font-size: 12px; color: #555; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #e8e7e3; position: sticky; top: 0; z-index: 10; }
    .tab { flex: 1; text-align: center; padding: 7px 2px; font-size: 12px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #1D9E75; border-bottom-color: #1D9E75; font-weight: 600; }
    .content { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
    .content.active { display: block; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-box { background: #fff; border-radius: 10px; padding: 12px; text-align: center; }
    .stat-n { font-size: 26px; font-weight: 700; color: #1D9E75; }
    .stat-l { font-size: 11px; color: #888; margin-top: 2px; }
    .card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .sec-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 10px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: #E1F5EE; color: #085041; font-size: 13px; padding: 5px 11px; border-radius: 20px; }
    .chip-gold { background: #FFF3CD; color: #856404; border: 1px solid #FFD700; font-size: 13px; padding: 5px 11px; border-radius: 20px; }
    .chip-silver { background: #F0F0F0; color: #555; border: 1px solid #C0C0C0; font-size: 13px; padding: 5px 11px; border-radius: 20px; }
    .chip-bronze { background: #FDE8D8; color: #7B3F00; border: 1px solid #CD7F32; font-size: 13px; padding: 5px 11px; border-radius: 20px; }
    .chip.absent { background: #f1efe8; color: #888; }
    .share-btn { width: 100%; padding: 14px; background: #FEE500; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; color: #2c2c2a; cursor: pointer; margin-top: 4px; }
    .share-btn:active { opacity: 0.8; transform: scale(0.98); }
    .paste-area { width: 100%; height: 130px; border: 1.5px solid #e8e7e3; border-radius: 10px; padding: 12px; font-size: 14px; resize: none; font-family: inherit; background: #fafaf8; }
    .paste-area:focus { outline: none; border-color: #1D9E75; }
    .submit-btn { width: 100%; margin-top: 8px; padding: 13px; background: #1D9E75; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; }
    .submit-btn:active { opacity: 0.85; }
    .result-box { margin-top: 10px; padding: 12px 14px; background: #E1F5EE; border-radius: 10px; font-size: 13px; line-height: 1.8; display: none; }
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f1efe8; }
    .rank-row:last-child { border-bottom: none; }
    .rank-num { font-size: 13px; color: #aaa; width: 22px; text-align: center; }
    .rank-medal { font-size: 16px; width: 22px; text-align: center; }
    .rank-name { font-size: 14px; flex: 1; font-weight: 500; }
    .rank-bar-wrap { width: 90px; background: #f1efe8; border-radius: 4px; height: 6px; }
    .rank-bar { height: 6px; border-radius: 4px; background: #1D9E75; transition: width 0.5s ease; }
    .rank-cnt { font-size: 13px; color: #666; width: 36px; text-align: right; }
    .monthly-wrap { overflow: auto; max-height: 70vh; }
    .monthly-tbl { border-collapse: collapse; font-size: 11px; white-space: nowrap; table-layout: fixed; }
    .monthly-tbl th, .monthly-tbl td { border: 0.5px solid #e8e7e3; padding: 5px 4px; text-align: center; }
    .monthly-tbl th { background: #f5f4f0; font-weight: 500; color: #666; position: sticky; top: 0; z-index: 2; }
    .monthly-tbl td:first-child, .monthly-tbl th:first-child { position: sticky; left: 0; z-index: 3; background: #f5f4f0; min-width: 32px; width: 32px; }
    .monthly-tbl td:first-child { background: #fff; font-size: 11px; color: #aaa; }
    .monthly-tbl td:nth-child(2), .monthly-tbl th:nth-child(2) { position: sticky; left: 32px; z-index: 3; background: #f5f4f0; min-width: 80px; width: 80px; }
    .monthly-tbl td:nth-child(2) { background: #fff; text-align: left; padding-left: 6px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
    .monthly-tbl td:nth-child(3), .monthly-tbl th:nth-child(3) { position: sticky; left: 112px; z-index: 3; background: #f5f4f0; min-width: 32px; width: 32px; }
    .monthly-tbl td:nth-child(3) { background: #fff; font-weight: 600; color: #185FA5; }
    .monthly-tbl th:first-child, .monthly-tbl th:nth-child(2), .monthly-tbl th:nth-child(3) { z-index: 4; }
    .o-mark { color: #1D9E75; font-weight: 700; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2c2c2a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .empty { color: #bbb; font-size: 13px; padding: 4px 0; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #e8e7e3; transition: background 0.15s; }
    .pin-dot.filled { background: #2c2c2a; }
    .pin-btn { padding: 14px; font-size: 18px; font-weight: 600; background: #f5f4f0; border: none; border-radius: 10px; cursor: pointer; }
    .pin-btn:active { background: #e8e7e3; }
  </style>
</head>
<body>
<div class="header">
  <h1 id="header-title" onclick="handleAdminTap()" style="user-select:none;-webkit-user-select:none">폭헬방 출석부 🏋️</h1>
  <div class="date" id="header-date"></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('admin')">출석입력</div>
  <div class="tab" onclick="switchTab('today')">어제</div>
  <div class="tab" onclick="switchTab('ranking')">랭킹</div>
  <div class="tab" onclick="switchTab('monthly')">출석표</div>
  <div class="tab" onclick="switchTab('alias')">별명관리</div>
  <div class="tab" id="tab-mgmt-btn" onclick="switchTab('mgmt')" style="display:none;color:#E24B4A">관리자</div>
</div>

<div class="content" id="tab-today">
  <div class="stat-row">
    <div class="stat-box"><div class="stat-n" id="s-count">-</div><div class="stat-l">어제 출석</div></div>
    <div class="stat-box"><div class="stat-n" id="s-total">-</div><div class="stat-l">전체 멤버</div></div>
    <div class="stat-box"><div class="stat-n" id="s-rate">-</div><div class="stat-l">출석률</div></div>
  </div>
  <div class="card">
    <div class="sec-title">✅ 출석 (<span id="present-cnt">0</span>명)</div>
    <div class="chip-wrap" id="present-list"><span class="empty">아직 없음</span></div>
  </div>
  <div class="card">
    <div class="sec-title">❌ 미출석 (<span id="absent-cnt">0</span>명)</div>
    <div class="chip-wrap" id="absent-list"></div>
  </div>
  <button class="share-btn" onclick="shareToKakao()">📤 카카오톡으로 공유하기</button>
</div>

<div class="content" id="tab-ranking">
  <div class="card" style="margin-bottom:8px;padding:6px 10px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
      <button onclick="moveRankMonth(-1)" style="background:#f1efe8;border:none;border-radius:6px;padding:4px 10px;font-size:14px;cursor:pointer;">‹</button>
      <select id="rank-month-select" onchange="selectRankMonth(this.value)" style="flex:1;text-align:center;font-size:13px;font-weight:600;padding:5px;border:1px solid #e8e7e3;border-radius:6px;background:#fff;color:#2c2c2a;"></select>
      <button onclick="moveRankMonth(1)" style="background:#f1efe8;border:none;border-radius:6px;padding:4px 10px;font-size:14px;cursor:pointer;">›</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-title" style="margin-bottom:12px" id="ranking-title">🏆 이번 달 누적 출석 순위</div>
    <div id="ranking-list"></div>
  </div>
  <div class="card" style="margin-top:0">
    <div style="font-size:12px;color:#888;line-height:1.8">
      <b style="color:#2c2c2a">📋 순위 산정법</b><br>
      1순위 — 이달 출석 횟수 (많은 순)<br>
      2순위 — 올해 총 출석일수 (많은 순)<br>
      3순위 — 이름 가나다순
    </div>
  </div>
</div>

<div class="content" id="tab-monthly">
  <div class="card" style="margin-bottom:8px;padding:6px 10px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
      <button onclick="moveMonth(-1)" style="background:#f1efe8;border:none;border-radius:6px;padding:4px 10px;font-size:14px;cursor:pointer;">‹</button>
      <select id="month-select" onchange="selectMonth(this.value)" style="flex:1;text-align:center;font-size:13px;font-weight:600;padding:5px;border:1px solid #e8e7e3;border-radius:6px;background:#fff;color:#2c2c2a;"></select>
      <button onclick="moveMonth(1)" style="background:#f1efe8;border:none;border-radius:6px;padding:4px 10px;font-size:14px;cursor:pointer;">›</button>
    </div>
  </div>
  <div id="monthly-tables"></div>
</div>

<div class="content active" id="tab-admin">
  <div class="card">
    <div class="sec-title" style="margin-bottom:8px">📋 카카오톡 출석 메시지 붙여넣기</div>
    <textarea class="paste-area" id="kakao-text" placeholder="예시)
26. 4. 27. (월) 출석부
딩딩, 무지, 손라, 제제, 가쥬아, 꽁치, 방장, 스딩, 유치원, 주이, 밥춘식"></textarea>
    <button class="submit-btn" onclick="submitAttendance()">✅ 출석 등록하기</button>
    <div class="result-box" id="result-box"></div>
  </div>
</div>

<div class="content" id="tab-alias">
  <div class="card">
    <div class="sec-title" style="margin-bottom:12px">🏷️ 별명 추가</div>
    <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
      <select id="alias-member-select" style="flex:1;min-width:100px;padding:9px;border:1.5px solid #e8e7e3;border-radius:8px;font-size:13px;background:#fff;color:#2c2c2a;"></select>
      <input id="alias-input" type="text" placeholder="별명 입력 (예: 재동)" style="flex:1;min-width:100px;padding:9px;border:1.5px solid #e8e7e3;border-radius:8px;font-size:13px;">
      <button onclick="addAlias()" style="padding:9px 16px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">추가</button>
    </div>
    <div style="font-size:12px;color:#aaa;margin-bottom:12px">"재동" 입력 시 "양재동"으로 자동 인식돼요</div>
    <div id="alias-list"></div>
  </div>
</div>

<!-- 관리자 탭 -->
<div class="content" id="tab-mgmt">
  <div class="card">
    <div class="sec-title" style="margin-bottom:12px">➕ 멤버 추가</div>
    <div style="display:flex;gap:6px">
      <input id="mgmt-new-name" type="text" placeholder="새 멤버 이름"
             onkeydown="if(event.key==='Enter')mgmtAddMember()"
             style="flex:1;padding:9px;border:1.5px solid #e8e7e3;border-radius:8px;font-size:14px;">
      <button onclick="mgmtAddMember()"
              style="padding:9px 16px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">추가</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-title" style="margin-bottom:10px">👥 멤버 목록</div>
    <div id="mgmt-member-list"></div>
  </div>
  <button onclick="exitAdmin()"
          style="width:100%;padding:12px;background:#f1efe8;border:none;border-radius:10px;font-size:14px;color:#888;cursor:pointer;margin-top:4px">
    🔒 관리자 모드 종료
  </button>
</div>

<!-- PIN 모달 -->
<div id="pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:24px 20px;width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">🔐 관리자 PIN</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:16px">4자리 PIN을 입력하세요</div>
    <div id="pin-dots" style="display:flex;justify-content:center;gap:12px;margin-bottom:20px">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <button class="pin-btn" onclick="pinInput('1')">1</button>
      <button class="pin-btn" onclick="pinInput('2')">2</button>
      <button class="pin-btn" onclick="pinInput('3')">3</button>
      <button class="pin-btn" onclick="pinInput('4')">4</button>
      <button class="pin-btn" onclick="pinInput('5')">5</button>
      <button class="pin-btn" onclick="pinInput('6')">6</button>
      <button class="pin-btn" onclick="pinInput('7')">7</button>
      <button class="pin-btn" onclick="pinInput('8')">8</button>
      <button class="pin-btn" onclick="pinInput('9')">9</button>
      <button class="pin-btn" onclick="pinClear()" style="background:#f1efe8;color:#888;font-size:13px">지우기</button>
      <button class="pin-btn" onclick="pinInput('0')">0</button>
      <button class="pin-btn" onclick="pinCancel()" style="background:#f1efe8;color:#888;font-size:13px">취소</button>
    </div>
    <div id="pin-error" style="font-size:12px;color:#E24B4A;margin-top:12px;min-height:16px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const now = new Date();
  const kstNow = now; // 브라우저는 이미 로컬 시간
  const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
  const today = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,"0")}-${String(yesterday.getDate()).padStart(2,"0")}`;

  function switchTab(name) {
    ["admin","today","ranking","monthly","alias","mgmt"].forEach((n, i) => {
      const tabEl = document.querySelectorAll(".tab")[i];
      if (tabEl) tabEl.classList.toggle("active", n === name);
      const contentEl = document.getElementById("tab-" + n);
      if (contentEl) contentEl.classList.toggle("active", n === name);
    });
    if (name === "ranking") loadRanking();
    if (name === "monthly") loadMonthly();
    if (name === "alias") loadAliases();
    if (name === "mgmt") loadMgmtMembers();
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  async function loadToday() {
    const res = await fetch(`/api/today?date=${today}`);
    const d = await res.json();
    const dt = new Date(today + "T00:00:00");
    const days = ["일","월","화","수","목","금","토"];
    // 헤더는 오늘 날짜로
    const todayDt = new Date(kstNow);
    document.getElementById("header-date").textContent =
            `${todayDt.getMonth()+1}월 ${todayDt.getDate()}일(${days[todayDt.getDay()]})`;
    document.getElementById("s-count").textContent = d.count;
    document.getElementById("s-total").textContent = d.total;
    document.getElementById("s-rate").textContent = (d.count / d.total * 100).toFixed(1) + "%";
    document.getElementById("present-cnt").textContent = d.count;
    document.getElementById("absent-cnt").textContent = d.absent.length;
    // 1~3위 뱃지용 랭킹 가져오기
    const rankRes = await fetch("/api/monthly");
    const rankData = await rankRes.json();
    const top3 = rankData.slice(0, 3).map(r => r.name);
    const medals = ["🥇", "🥈", "🥉"];
    const medalColors = ["chip-gold", "chip-silver", "chip-bronze"];

    // 금,은,동,나머지 순으로 정렬
    const sorted = [...d.present].sort((a, b) => {
      const ai = top3.indexOf(a);
      const bi = top3.indexOf(b);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
    document.getElementById("present-list").innerHTML =
            sorted.length ? sorted.map(n => {
              const rankIdx = top3.indexOf(n);
              if (rankIdx !== -1) {
                return `<span class="chip ${medalColors[rankIdx]}">${medals[rankIdx]} ${n}</span>`;
              }
              return `<span class="chip">${n}</span>`;
            }).join("") : '<span class="empty">아직 없음</span>';
    document.getElementById("absent-list").innerHTML =
            d.absent.map(n => `<span class="chip absent">${n}</span>`).join("");
  }

  let rankMonths = [];
  let rankMonthIdx = 0;

  async function loadRanking() {
    const now = new Date();
    const nowYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    const res = await fetch("/api/months");
    rankMonths = await res.json();
    if (!rankMonths.includes(nowYM)) rankMonths.push(nowYM);
    rankMonths.sort();
    // 마지막에 "연간 전체" 추가
    const lastYear = rankMonths[rankMonths.length - 1].split("-")[0];
    rankMonths.push(`${lastYear}-ALL`);
    rankMonthIdx = rankMonths.indexOf(nowYM);

    const sel = document.getElementById("rank-month-select");
    sel.innerHTML = rankMonths.map((ym, i) => {
      if (ym.endsWith("-ALL")) {
        const y = ym.split("-")[0];
        return `<option value="${i}">${y}년 전체</option>`;
      }
      const [y, m] = ym.split("-");
      return `<option value="${i}" ${i === rankMonthIdx ? 'selected' : ''}>${y}년 ${parseInt(m)}월</option>`;
    }).join("");

    await renderRanking();
  }

  async function renderRanking() {
    const ym = rankMonths[rankMonthIdx];
    let data, title;

    if (ym.endsWith("-ALL")) {
      const y = ym.split("-")[0];
      const res = await fetch(`/api/yearly?year=${y}`);
      data = await res.json();
      title = `🏆 ${y}년 전체 출석 순위`;
    } else {
      const [y, m] = ym.split("-");
      const res = await fetch(`/api/monthly?year=${y}&month=${parseInt(m)}`);
      data = await res.json();
      title = `🏆 ${parseInt(m)}월 누적 출석 순위`;
    }

    const max = data[0]?.count || 1;
    const medals = ["🥇","🥈","🥉"];

    document.getElementById("ranking-title").textContent = title;
    document.getElementById("rank-month-select").value = rankMonthIdx;
    document.getElementById("ranking-list").innerHTML = data.map((r, i) => `
    <div class="rank-row">
      <div class="${i < 3 ? 'rank-medal' : 'rank-num'}">${i < 3 ? medals[i] : i+1}</div>
      <div class="rank-name">${r.name}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(r.count/max*100)}%;background:${i<3?'#E24B4A':'#1D9E75'}"></div></div>
      <div class="rank-cnt">${r.count}회</div>
    </div>
  `).join("");
  }

  async function moveRankMonth(dir) {
    const newIdx = rankMonthIdx + dir;
    if (newIdx < 0 || newIdx >= rankMonths.length) return;
    rankMonthIdx = newIdx;
    await renderRanking();
  }

  async function selectRankMonth(idx) {
    rankMonthIdx = parseInt(idx);
    await renderRanking();
  }

  async function buildMonthTable(ym) {
    const [y, m] = ym.split("-");
    const res = await fetch(`/api/monthly?year=${y}&month=${parseInt(m)}`);
    const data = await res.json();
    const daysInMonth = new Date(parseInt(y), parseInt(m), 0).getDate();

    const dayCounts = {};
    data.forEach(r => {
      r.dates.forEach(dt => {
        const day = parseInt(dt.split("-")[2]);
        dayCounts[day] = (dayCounts[day] || 0) + 1;
      });
    });
    const totalAll = data.reduce((s, r) => s + r.count, 0);

    let html = `<div class="card" style="margin-bottom:12px">
    <div class="sec-title" style="margin-bottom:10px">📅 ${parseInt(m)}월 전체 출석표</div>
    <div class="monthly-wrap"><table class="monthly-tbl">
    <thead><tr><th style="width:32px;min-width:32px">No</th><th style="width:80px;min-width:80px">이름</th><th style="width:32px;min-width:32px">참여</th>`;
    for (let d = 1; d <= daysInMonth; d++) html += `<th style="width:24px;min-width:24px">${d}</th>`;
    html += "</tr></thead><tbody>";

    data.forEach((r, i) => {
      const ds = new Set(r.dates);
      html += `<tr><td style="color:#aaa;font-size:11px;width:32px;max-width:32px">${i+1}</td><td style="width:80px;max-width:80px;overflow:hidden;text-overflow:ellipsis">${r.name}</td><td style="width:32px;max-width:32px;font-weight:600;color:#185FA5">${r.count}</td>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${y}-${m}-${String(d).padStart(2,"0")}`;
        html += `<td>${ds.has(key) ? '<span class="o-mark">O</span>' : ''}</td>`;
      }
      html += "</tr>";
    });

    html += `<tr style="background:#FEE500;border-top:2px solid #D3D1C7">
    <td style="font-weight:700;color:#2C2C2A;font-size:11px;width:32px;max-width:32px"></td>
    <td style="font-weight:700;color:#2C2C2A;text-align:left;padding-left:8px;width:80px;max-width:80px">일별 합계</td>
    <td style="font-weight:700;color:#2C2C2A;width:32px;max-width:32px">${totalAll}</td>`;
    for (let d = 1; d <= daysInMonth; d++) {
      html += `<td style="font-weight:700;color:#2C2C2A">${dayCounts[d] || ''}</td>`;
    }
    html += "</tr></tbody></table></div></div>";
    return html;
  }

  let allMonths = [];
  let currentMonthIdx = 0;

  async function loadMonthly() {
    const now = new Date();
    const nowYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

    const res = await fetch("/api/months");
    allMonths = await res.json();

    // 현재 월이 목록에 없으면 추가
    if (!allMonths.includes(nowYM)) allMonths.push(nowYM);
    allMonths.sort();

    // 현재 달로 초기화
    currentMonthIdx = allMonths.indexOf(nowYM);

    // 드랍다운 옵션 생성
    const sel = document.getElementById("month-select");
    sel.innerHTML = allMonths.map((ym, i) => {
      const [y, m] = ym.split("-");
      return `<option value="${i}" ${i === currentMonthIdx ? 'selected' : ''}>${y}년 ${parseInt(m)}월</option>`;
    }).join("");

    await renderCurrentMonth();
  }

  async function renderCurrentMonth() {
    const container = document.getElementById("monthly-tables");
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa">불러오는 중...</div>';
    const ym = allMonths[currentMonthIdx];
    const html = await buildMonthTable(ym);
    container.innerHTML = html;
    document.getElementById("month-select").value = currentMonthIdx;

  }

  async function moveMonth(dir) {
    const newIdx = currentMonthIdx + dir;
    if (newIdx < 0 || newIdx >= allMonths.length) return;
    currentMonthIdx = newIdx;
    await renderCurrentMonth();
  }

  async function selectMonth(idx) {
    currentMonthIdx = parseInt(idx);
    await renderCurrentMonth();
  }

  async function shareToKakao() {
    const res = await fetch(`/api/share-text?date=${today}`);
    const d = await res.json();
    if (navigator.share) {
      navigator.share({ text: d.text });
    } else {
      await navigator.clipboard.writeText(d.text);
      showToast("✅ 클립보드에 복사됐어요! 카톡에 붙여넣기 하세요");
    }
  }

  async function submitAttendance() {
    const text = document.getElementById("kakao-text").value.trim();
    if (!text) return showToast("메시지를 붙여넣어 주세요");
    const btn = document.querySelector(".submit-btn");
    btn.textContent = "등록 중...";
    btn.disabled = true;
    const res = await fetch("/api/checkin", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({text})
    });
    const d = await res.json();
    btn.textContent = "✅ 출석 등록하기";
    btn.disabled = false;
    const box = document.getElementById("result-box");
    box.style.display = "block";
    box.innerHTML = `<b>📅 ${d.date} 출석 등록 완료!</b><br>
    ✅ ${d.matched.length}명 등록: ${d.matched.join(", ")}
    ${d.unmatched.length ? `<br>⚠️ 못 찾은 이름: ${d.unmatched.join(", ")}` : ""}`;
    loadToday();
    showToast(`${d.matched.length}명 출석 등록 완료!`);
  }

  loadToday();

  async function loadAliases() {
    const [mres, ares] = await Promise.all([
      fetch("/api/members"),
      fetch("/api/aliases")
    ]);
    const members = await mres.json();
    const aliases = await ares.json();

    // 멤버 드랍다운
    const sel = document.getElementById("alias-member-select");
    if (sel) {
      sel.innerHTML = members.map(m => `<option value="${m.name}">${m.name}</option>`).join("");
    }

    // alias 목록
    const listEl = document.getElementById("alias-list");
    if (!listEl) return;

    if (!aliases.length) {
      listEl.innerHTML = '<div style="font-size:13px;color:#aaa;padding:8px 0">등록된 별명 없음</div>';
      return;
    }

    // 멤버별 그룹
    const grouped = {};
    aliases.forEach(a => {
      if (!grouped[a.member_name]) grouped[a.member_name] = [];
      grouped[a.member_name].push(a);
    });

    listEl.innerHTML = Object.entries(grouped).map(([name, list]) => `
    <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1efe8">
      <div style="font-size:13px;font-weight:600;color:#2c2c2a;margin-bottom:6px">${name}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${list.map(a => `
          <span style="background:#E1F5EE;padding:5px 10px;border-radius:20px;font-size:13px;color:#085041;display:flex;align-items:center;gap:6px">
            ${a.alias}
            <button onclick="deleteAlias(${a.id})" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:15px;padding:0;line-height:1">×</button>
          </span>
        `).join("")}
      </div>
    </div>
  `).join("");
  }

  async function addAlias() {
    const member_name = document.getElementById("alias-member-select").value;
    const alias = document.getElementById("alias-input").value.trim();
    if (!alias) return showToast("별명을 입력해주세요");
    const res = await fetch("/api/aliases/add", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({member_name, alias})
    });
    const d = await res.json();
    if (d.error) return showToast("❌ " + d.error);
    document.getElementById("alias-input").value = "";
    showToast(`✅ ${member_name} → "${alias}" 추가됐어요`);
    loadAliases();
  }

  async function deleteAlias(id) {
    await fetch("/api/aliases/delete", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({id})
    });
    showToast("삭제됐어요");
    loadAliases();
  }

  // ── 관리자 모드 ───────────────────────────────────────────
  const ADMIN_PIN = "0531";
  let adminTapCount = 0, adminTapTimer = null, pinValue = "";

  function handleAdminTap() {
    adminTapCount++;
    clearTimeout(adminTapTimer);
    if (adminTapCount >= 5) {
      adminTapCount = 0;
      const isActive = document.getElementById("tab-mgmt-btn").style.display !== "none";
      if (isActive) { exitAdmin(); return; }
      openPinModal();
      return;
    }
    adminTapTimer = setTimeout(() => { adminTapCount = 0; }, 1500);
  }

  function openPinModal() {
    pinValue = "";
    updatePinDots();
    document.getElementById("pin-error").textContent = "";
    document.getElementById("pin-modal").style.display = "flex";
  }

  function pinInput(digit) {
    if (pinValue.length >= 4) return;
    pinValue += digit;
    updatePinDots();
    if (pinValue.length === 4) setTimeout(checkPin, 150);
  }

  function pinClear() {
    pinValue = pinValue.slice(0, -1);
    updatePinDots();
    document.getElementById("pin-error").textContent = "";
  }

  function pinCancel() {
    document.getElementById("pin-modal").style.display = "none";
    pinValue = "";
  }

  function updatePinDots() {
    document.querySelectorAll(".pin-dot").forEach((d, i) => {
      d.classList.toggle("filled", i < pinValue.length);
    });
  }

  function checkPin() {
    if (pinValue === ADMIN_PIN) {
      document.getElementById("pin-modal").style.display = "none";
      document.getElementById("tab-mgmt-btn").style.display = "";
      showToast("🔓 관리자 모드 활성화");
      switchTab("mgmt");
    } else {
      document.getElementById("pin-error").textContent = "PIN이 틀렸어요";
      pinValue = "";
      updatePinDots();
    }
  }

  function exitAdmin() {
    document.getElementById("tab-mgmt-btn").style.display = "none";
    showToast("🔒 관리자 모드 종료");
    switchTab("admin");
  }

  async function loadMgmtMembers() {
    const res = await fetch("/api/members");
    const members = await res.json();
    const el = document.getElementById("mgmt-member-list");
    el.innerHTML = members.length ? members.map(m => {
      const sname = m.name.replace(/'/g, "\\'");
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f1efe8">
        <span style="font-size:14px;font-weight:500">${m.name}</span>
        <span style="display:flex;gap:6px">
          <button onclick="mgmtRename(${m.id},'${sname}')"
            style="background:#f1efe8;border:none;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;color:#555">이름변경</button>
          <button onclick="mgmtDelete(${m.id},'${sname}')"
            style="background:#FDECEA;border:none;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;color:#C0392B">삭제</button>
        </span>
      </div>`;
    }).join("") : '<div style="font-size:13px;color:#aaa">멤버 없음</div>';
  }

  async function mgmtAddMember() {
    const input = document.getElementById("mgmt-new-name");
    const name = input.value.trim();
    if (!name) return showToast("이름을 입력해주세요");
    const res = await fetch("/api/members/add", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({name})
    });
    const d = await res.json();
    if (d.error) return showToast("❌ " + d.error);
    input.value = "";
    showToast(`✅ "${name}" 추가됐어요`);
    loadMgmtMembers();
  }

  async function mgmtRename(id, oldName) {
    const newName = prompt(`"${oldName}" → 새 이름`, oldName);
    if (!newName || newName.trim() === oldName) return;
    const res = await fetch("/api/members/rename", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id, name: newName.trim()})
    });
    const d = await res.json();
    if (d.error) return showToast("❌ " + d.error);
    showToast(`✅ "${oldName}" → "${newName.trim()}" 변경됐어요`);
    loadMgmtMembers();
  }

  async function mgmtDelete(id, name) {
    if (!confirm(`"${name}" 멤버를 삭제할까요?`)) return;
    const res = await fetch("/api/members/delete", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id})
    });
    const d = await res.json();
    if (d.error) return showToast("❌ " + d.error);
    showToast(`"${name}" 삭제됐어요`);
    loadMgmtMembers();
  }
  // ─────────────────────────────────────────────────────────
</script>
</body>
</html>
