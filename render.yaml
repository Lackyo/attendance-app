services:
  - type: web
    name: attendance-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -c 'from app import init_db; init_db()' && gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_URL
        sync: false
